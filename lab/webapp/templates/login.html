<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — EcoVault</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:system-ui,sans-serif; background:#f5f6fa; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:white; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); width:100%; max-width:400px; }
  h1 { color:#2d3436; margin-bottom:6px; text-align:center; }
  .subtitle { text-align:center; color:#b2bec3; margin-bottom:25px; font-size:0.9rem; }
  label { display:block; font-weight:600; color:#2d3436; margin-bottom:6px; font-size:0.9rem; }
  input[type=email], input[type=password] { width:100%; padding:10px 14px; border:2px solid #dfe6e9; border-radius:6px; font-size:1rem; margin-bottom:16px; transition:border-color 0.2s; }
  input:focus { outline:none; border-color:#0984e3; }
  button { width:100%; padding:12px; background:#d63031; color:white; border:none; border-radius:6px; font-size:1rem; font-weight:600; cursor:pointer; }
  button:hover { background:#c0392b; }
  .error { background:#ffeaa7; color:#d63031; padding:10px; border-radius:6px; margin-bottom:16px; font-size:0.9rem; }
  .hint { margin-top:20px; padding:12px; background:#f8f9fa; border-radius:6px; font-size:0.82rem; color:#636e72; }
  .hint code { background:#dfe6e9; padding:2px 5px; border-radius:3px; }
  a { color:#0984e3; text-decoration:none; }
  .back { text-align:center; margin-top:15px; }
</style>
</head>
<body>
<div class="login-box">
  <h1>&#128737; EcoVault</h1>
  <p class="subtitle">Connexion au portail de paiement</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="user@ecovault.com" required>
    <label for="password">Mot de passe</label>
    <input type="password" name="password" id="password" placeholder="••••••••" required>
    <button type="submit">Se connecter</button>
  </form>

  <div class="hint">
    <strong>&#128161; Compte fourni :</strong><br>
    <code>user@ecovault.com</code> / <code>User2026!</code><br>
    <em style="font-size:0.78rem">(Trouver les autres comptes fait partie de l'exercice)</em>
  </div>

  <div class="back">
    <a href="/">&larr; Retour à l'accueil</a>
  </div>
</div>
</body>
</html>
